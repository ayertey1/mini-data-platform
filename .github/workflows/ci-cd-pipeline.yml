# .github/workflows/ci-cd-pipeline.yml
name: Mini Data Platform CI/CD

on:
  push:
    branches: 
      - prod
      - dev/infrastructure
  pull_request:
    branches: 
      - prod
      - dev/infrastructure

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Test and Validation Job
  test:
    runs-on: ubuntu-latest
    name: Test & Validate
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r webhook/requirements.txt
        pip install -r airflow/requirements.txt

    - name: Validate Docker Compose
      run: |
        docker compose config

    - name: Test webhook service (basic import)
      run: |
        cd webhook
        python -c "import app; print('Webhook app imports successfully')"

    - name: Validate environment file
      run: |
        if [ -f .env.example ]; then
          echo "Environment template found"
        else
          echo "Warning: No .env.example found"
        fi

    - name: Check DAG syntax
      run: |
        for dag in airflow/dags/*.py; do
          echo "Checking $dag..."
          python -m py_compile "$dag" || exit 1
        done
        echo "All DAGs compile successfully"

  # Build and Push Images
  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build & Push Images
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for webhook
      id: meta-webhook
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/webhook
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix=sha-

    - name: Build and push webhook image
      uses: docker/build-push-action@v5
      with:
        context: ./webhook
        push: true
        tags: ${{ steps.meta-webhook.outputs.tags }}
        labels: ${{ steps.meta-webhook.outputs.labels }}

  # Development Deployment
  deploy-dev:
    if: github.ref == 'refs/heads/dev/infrastructure'
    needs: [test, build]
    runs-on: ubuntu-latest
    name: Deploy to Development
    environment: development

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create required PostgreSQL init files
      run: |
        # Create basic init files if they don't exist
        mkdir -p infra/postgres
        
        if [ ! -f infra/postgres/init_db.sql ]; then
          cat > infra/postgres/init_db.sql << 'EOF'
        -- Basic Airflow database initialization
        -- This file is created by CI/CD if missing
        SELECT 'Airflow database initialized' as status;
        EOF
        fi
        
        if [ ! -f infra/postgres/init_metabase.sql ]; then
          cat > infra/postgres/init_metabase.sql << 'EOF'
        -- Create Metabase database and user
        CREATE DATABASE metabase;
        CREATE USER metabase WITH PASSWORD 'metabase';
        GRANT ALL PRIVILEGES ON DATABASE metabase TO metabase;
        EOF
        fi
        
        if [ ! -f infra/postgres/init_sales_table.sql ]; then
          cat > infra/postgres/init_sales_table.sql << 'EOF'
        -- Create sales table for storing processed data
        CREATE TABLE IF NOT EXISTS sales (
            id SERIAL PRIMARY KEY,
            sale_date DATE NOT NULL,
            product_id VARCHAR(100) NOT NULL,
            product_name VARCHAR(255) NOT NULL,
            quantity INTEGER NOT NULL DEFAULT 0,
            unit_price DECIMAL(10,2) NOT NULL DEFAULT 0.00,
            total_amount DECIMAL(12,2) NOT NULL DEFAULT 0.00,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        );

        -- Create indexes for better query performance
        CREATE INDEX IF NOT EXISTS idx_sales_date ON sales(sale_date);
        CREATE INDEX IF NOT EXISTS idx_sales_product_id ON sales(product_id);
        CREATE INDEX IF NOT EXISTS idx_sales_created_at ON sales(created_at);
        EOF
        fi

    - name: Set up environment variables
      run: |
        cat > .env << EOF
        # Development Environment
        MINIO_ROOT_USER=minioadmin
        MINIO_ROOT_PASSWORD=minioadmin
        MINIO_ACCESS_KEY=minioadmin
        MINIO_SECRET_KEY=minioadmin
        
        POSTGRES_USER=airflow
        POSTGRES_PASSWORD=airflow
        POSTGRES_DB=airflow
        
        METABASE_DB=metabase
        METABASE_USER=metabase
        METABASE_PASSWORD=metabase
        
        AIRFLOW_API_USER=admin
        AIRFLOW_API_PASS=admin_dev
        AIRFLOW__FERNET_KEY=dev_fernet_key_12345678901234567890123456789012
        AIRFLOW__WEBSERVER__SECRET_KEY=dev_secret_key_12345678901234567890123456789012
        
        TARGET_DAG_ID=sales_pipeline
        
        # Development specific
        ENVIRONMENT=development
        DEBUG=true
        EOF

    - name: Start core services first
      run: |
        echo "Starting core infrastructure services..."
        
        # Stop any existing services
        docker compose down --remove-orphans || true
        
        # Remove old volumes to ensure clean start
        docker volume prune -f || true
        
        # Start PostgreSQL and MinIO first
        docker compose up -d postgres minio
        
        echo "Waiting for core services to initialize..."
        sleep 45

    - name: Wait for PostgreSQL to be healthy
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..60}; do
          if docker compose exec -T postgres pg_isready -U airflow; then
            echo "PostgreSQL is ready!"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "PostgreSQL failed to start in time"
            docker compose logs postgres
            exit 1
          fi
          echo "PostgreSQL not ready yet... retrying in 5s ($i/60)"
          sleep 5
        done

    - name: Wait for MinIO to be healthy
      run: |
        echo "Waiting for MinIO to be ready..."
        for i in {1..30}; do
          if curl -f http://localhost:9000/minio/health/ready >/dev/null 2>&1; then
            echo "MinIO is ready!"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "MinIO failed to start in time"
            docker compose logs minio
            exit 1
          fi
          echo "MinIO not ready yet... retrying in 5s ($i/30)"
          sleep 5
        done

    - name: Start remaining services
      run: |
        echo "Starting remaining services..."
        
        # Start MinIO client for configuration
        docker compose up -d mc
        sleep 20
        
        # Start application services
        docker compose up -d airflow-webserver airflow-scheduler webhook
        
        echo "Waiting for application services to start..."
        sleep 60

    - name: Health check all services
      run: |
        echo "Performing comprehensive health checks..."
        
        # Check Webhook
        for i in {1..20}; do
          if curl -f http://localhost:8000/health >/dev/null 2>&1; then
            echo "Webhook is healthy!"
            break
          fi
          if [ $i -eq 20 ]; then
            echo "Webhook health check failed"
            docker compose logs webhook
            exit 1
          fi
          echo "Waiting for webhook... ($i/20)"
          sleep 3
        done
        
        # Check Airflow
        for i in {1..30}; do
          if curl -f http://localhost:8080/health >/dev/null 2>&1; then
            echo "Airflow is healthy!"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Airflow health check failed"
            docker compose logs airflow-webserver
            docker compose logs airflow-scheduler
            exit 1
          fi
          echo "Waiting for Airflow... ($i/30)"
          sleep 5
        done

    - name: Start final services
      run: |
        echo "Starting final services..."
        docker compose up -d metabase
        sleep 10
        echo "Development deployment successful!"

    - name: Show service status
      run: |
        echo "Final service status:"
        docker compose ps
        
        echo "Recent logs from key services:"
        echo "=== WEBHOOK LOGS ==="
        docker compose logs webhook --tail 10
        echo "=== AIRFLOW SCHEDULER LOGS ==="
        docker compose logs airflow-scheduler --tail 10

    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        
        # Test file upload and processing
        if [ -f data-generator/generate_sales.py ]; then
          python data-generator/generate_sales.py || echo "Test data generation failed"
          sleep 30
        else
          echo "No data generator found, skipping file upload test"
        fi
        
        echo "Integration tests completed"

  # Production Deployment
  deploy-prod:
    if: github.ref == 'refs/heads/prod'
    needs: [test, build]
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create required PostgreSQL init files
      run: |
        # Create basic init files if they don't exist
        mkdir -p infra/postgres
        
        if [ ! -f infra/postgres/init_db.sql ]; then
          cat > infra/postgres/init_db.sql << 'EOF'
        -- Basic Airflow database initialization
        SELECT 'Airflow database initialized' as status;
        EOF
        fi
        
        if [ ! -f infra/postgres/init_metabase.sql ]; then
          cat > infra/postgres/init_metabase.sql << 'EOF'
        -- Create Metabase database and user
        CREATE DATABASE metabase;
        CREATE USER metabase WITH PASSWORD '${{ secrets.METABASE_PASSWORD }}';
        GRANT ALL PRIVILEGES ON DATABASE metabase TO metabase;
        EOF
        fi
        
        if [ ! -f infra/postgres/init_sales_table.sql ]; then
          cat > infra/postgres/init_sales_table.sql << 'EOF'
        -- Create sales table for storing processed data
        CREATE TABLE IF NOT EXISTS sales (
            id SERIAL PRIMARY KEY,
            sale_date DATE NOT NULL,
            product_id VARCHAR(100) NOT NULL,
            product_name VARCHAR(255) NOT NULL,
            quantity INTEGER NOT NULL DEFAULT 0,
            unit_price DECIMAL(10,2) NOT NULL DEFAULT 0.00,
            total_amount DECIMAL(12,2) NOT NULL DEFAULT 0.00,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
        );

        -- Create indexes for better query performance
        CREATE INDEX IF NOT EXISTS idx_sales_date ON sales(sale_date);
        CREATE INDEX IF NOT EXISTS idx_sales_product_id ON sales(product_id);
        CREATE INDEX IF NOT EXISTS idx_sales_created_at ON sales(created_at);
        EOF
        fi

    - name: Set up production environment
      run: |
        cat > .env << EOF
        # Production Environment
        MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
        MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
        MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
        MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
        
        POSTGRES_USER=${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB=${{ secrets.POSTGRES_DB }}
        
        METABASE_DB=${{ secrets.METABASE_DB }}
        METABASE_USER=${{ secrets.METABASE_USER }}
        METABASE_PASSWORD=${{ secrets.METABASE_PASSWORD }}
        
        AIRFLOW_API_USER=${{ secrets.AIRFLOW_API_USER }}
        AIRFLOW_API_PASS=${{ secrets.AIRFLOW_API_PASS }}
        AIRFLOW__FERNET_KEY=${{ secrets.AIRFLOW_FERNET_KEY }}
        AIRFLOW__WEBSERVER__SECRET_KEY=${{ secrets.AIRFLOW_SECRET_KEY }}
        
        TARGET_DAG_ID=sales_pipeline
        
        # Production specific
        ENVIRONMENT=production
        DEBUG=false
        EOF

    - name: Create backup
      run: |
        echo "Creating backup before deployment"
        
        # Backup databases if they exist
        docker compose exec -T postgres pg_dump -U ${{ secrets.POSTGRES_USER }} ${{ secrets.POSTGRES_DB }} > backup-airflow-$(date +%Y%m%d-%H%M%S).sql || echo "No existing Airflow DB to backup"
        docker compose exec -T postgres pg_dump -U ${{ secrets.METABASE_USER }} ${{ secrets.METABASE_DB }} > backup-metabase-$(date +%Y%m%d-%H%M%S).sql || echo "No existing Metabase DB to backup"
        
        echo "Backup completed"

    - name: Deploy to production
      run: |
        echo "Deploying to Production Environment"
        
        # Graceful shutdown
        docker compose down --remove-orphans || true
        
        # Start core services
        docker compose up -d postgres minio
        sleep 60
        
        # Start application services
        docker compose up -d airflow-webserver airflow-scheduler webhook mc
        sleep 120
        
        # Health checks
        curl -f http://localhost:9000/minio/health/ready || exit 1
        curl -f http://localhost:8000/health || exit 1
        curl -f http://localhost:8080/health || exit 1
        
        # Start remaining services
        docker compose up -d metabase
        
        echo "Production deployment successful"

    - name: Post-deployment validation
      run: |
        echo "Running post-deployment validation..."
        
        # Test webhook endpoint
        curl -X POST http://localhost:8000/minio-webhook \
             -H "Content-Type: application/json" \
             -H "Authorization: Bearer supersecret" \
             -d '{"test": "deployment_validation"}' || exit 1
        
        # Check DAG status
        curl -u ${{ secrets.AIRFLOW_API_USER }}:${{ secrets.AIRFLOW_API_PASS }} \
             http://localhost:8080/api/v1/dags/sales_pipeline || exit 1
        
        echo "Post-deployment validation successful"

  # Notification Job
  notify:
    needs: [deploy-dev, deploy-prod]
    if: always()
    runs-on: ubuntu-latest
    name: Send Notifications

    steps:
    - name: Notify on success
      if: needs.deploy-dev.result == 'success' || needs.deploy-prod.result == 'success'
      run: |
        echo "Deployment successful for branch: ${{ github.ref_name }}"

    - name: Notify on failure
      if: needs.deploy-dev.result == 'failure' || needs.deploy-prod.result == 'failure'
      run: |
        echo "Deployment failed for branch: ${{ github.ref_name }}"